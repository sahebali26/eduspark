    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #0d47a1;
            --text: #202124;
            --text-light: #5f6368;
            --bg: #ffffff;
            --bg-light: #f8f9fa;
            --border: #dadce0;
            --success: #0f9d58;
            --error: #d93025;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
            line-height: 1.6;
            color: var(--text);
            background: var(--bg-light);
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: var(--bg);
            padding: 2rem 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        h1 {
            color: var(--primary);
            font-size: 1.8rem;
        }
        
        .controls {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 8px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            cursor: pointer;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        
        .btn:hover {
            background: var(--bg-light);
            border-color: var(--primary);
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        
        .status {
            padding: 12px;
            border-radius: 4px;
            margin: 1rem 0;
            display: none;
        }
        
        .status.loading {
            background: #e8f0fe;
            color: var(--primary);
            display: block;
        }
        
        .status.success {
            background: #e6f4ea;
            color: var(--success);
            border: 1px solid var(--success);
            display: block;
        }
        
        .status.error {
            background: #fce8e6;
            color: var(--error);
            border: 1px solid var(--error);
            display: block;
        }
        
        .content-area {
            background: var(--bg);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);

            font-size: 0.9rem;

            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .content-section {
            margin: 2rem 0;
        }
        
        .paragraph {

        }
        
        .heading {

            margin: 1.5rem 0 0.5rem;

        .heading-1 { font-size: 1.8rem; }
        .heading-2 { font-size: 1.5rem; }
        .heading-3 { font-size: 1.3rem; }

        table {

<body>
    <header>
        <div class="container">
            <div class="header-content">
                <h1><i class="fas fa-book"></i> Google Doc Notes</h1>
                <div class="controls">
                    <button class="btn" onclick="loadDocument(true)">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                    <button class="btn btn-primary" onclick="openInDocs()">
                        <i class="fas fa-external-link-alt"></i> Open in Docs
                    </button>
                </div>
            </div>
        </div>
    </header>
    
    <div class="container">
        <div id="status" class="status loading">
            <i class="fas fa-spinner fa-spin"></i> Loading document...
        </div>
        
        <div class="content-area" id="content-area" style="display: none;">
            <h2 class="doc-title" id="doc-title"></h2>
            <div class="meta" id="meta-info"></div>
            <div id="content-container"></div>
        </div>
        
        <div class="empty-state" id="empty-state" style="display: none;">
            <i class="fas fa-file-alt"></i>
            <h3>No content loaded</h3>
            <p>Click refresh to load your Google Doc</p>
        </div>
    </div>
    
    <footer>
        <div class="container">
            <p>Content loaded from Google Docs | Updates automatically</p>
            <p id="footer-info"></p>
        </div>
    </footer>

    <script>
        // Configuration
        const CONFIG = {
            // REPLACE THIS WITH YOUR APPS SCRIPT URL
            SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbyB__p9o2iGJVRvBEP0Ui-2iQdAaYtBvCcaCwIMH8h-IdwpJC2mPwbCod3Ja1_7QoR0Bg/exec',
            AUTO_REFRESH: true,
            REFRESH_INTERVAL: 300000 // 5 minutes
        };
        
        // State
        let currentDocUrl = '';
        
        // DOM Elements
        const elements = {
            status: document.getElementById('status'),
            contentArea: document.getElementById('content-area'),
            emptyState: document.getElementById('empty-state'),
            docTitle: document.getElementById('doc-title'),
            metaInfo: document.getElementById('meta-info'),
            contentContainer: document.getElementById('content-container'),
            footerInfo: document.getElementById('footer-info')
        };
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Initializing Google Doc Viewer');
            loadDocument();
            
            if (CONFIG.AUTO_REFRESH) {
                setInterval(() => loadDocument(), CONFIG.REFRESH_INTERVAL);
            }
        });
        
        // Main function to load document
        async function loadDocument(force = false) {
            showLoading();
            
            try {
                // Add cache buster if forcing refresh
                const url = CONFIG.SCRIPT_URL + (force ? '?t=' + Date.now() : '');
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (data.success) {
                    showSuccess();
                    renderDocument(data);
                } else {
                    throw new Error(data.error || data.message || 'Failed to load document');
                }
                
            } catch (error) {
                showError(error);
            }
        }
        
        // Render document content
        function renderDocument(data) {
            // Update title
            elements.docTitle.textContent = data.title || 'Untitled Document';
            
            // Update meta info
            const lastUpdated = data.lastUpdated ? 
                new Date(data.lastUpdated).toLocaleString() : 'Unknown';
            
            elements.metaInfo.innerHTML = `
                <div><i class="far fa-clock"></i> Last updated: ${lastUpdated}</div>
                ${data.docUrl ? `<div><i class="fas fa-link"></i> <a href="${data.docUrl}" target="_blank">View original document</a></div>` : ''}
            `;
            
            // Save doc URL for the button
            currentDocUrl = data.docUrl;
            
            // Render content
            let html = '';
            
            // Render paragraphs
            if (data.paragraphs && data.paragraphs.length > 0) {
                data.paragraphs.forEach(para => {
                    if (para.heading && para.heading !== 'NORMAL') {
                        const level = para.heading.replace('HEADING', '');
                        html += `<div class="heading heading-${level}">${escapeHtml(para.text)}</div>`;
                    } else {
                        html += `<div class="paragraph">${escapeHtml(para.text)}</div>`;
                    }
                });
            } else if (data.content) {
                // Fallback to plain text
                const lines = data.content.split('\n').filter(line => line.trim());
                lines.forEach(line => {
                    html += `<div class="paragraph">${escapeHtml(line)}</div>`;
                });
            }
            
            // Render tables
            if (data.tables && data.tables.length > 0) {
                html += '<h3 class="heading-3">Tables</h3>';
                
                data.tables.forEach((table, index) => {
                    html += `<div class="content-section">
                        <h4>Table ${index + 1}</h4>
                        <table>`;
                    
                    table.forEach((row, rowIndex) => {
                        html += '<tr>';
                        row.forEach(cell => {
                            const tag = rowIndex === 0 ? 'th' : 'td';
                            const style = cell.background ? `style="background-color: ${cell.background};"` : '';
                            html += `<${tag} ${style}>${escapeHtml(cell.text)}</${tag}>`;
                        });
                        html += '</tr>';
                    });
                    
                    html += '</table></div>';
                });
            }
            
            elements.contentContainer.innerHTML = html || '<p>No content found in document.</p>';
            
            // Show content area
            elements.contentArea.style.display = 'block';
            elements.emptyState.style.display = 'none';
            
            // Update footer
            const itemCount = (data.paragraphs?.length || 0) + (data.tables?.length || 0);
            elements.footerInfo.textContent = `Loaded ${itemCount} items from Google Doc`;
        }
        
        // Open in Google Docs
        function openInDocs() {
            if (currentDocUrl) {
                window.open(currentDocUrl, '_blank');
            } else {
                alert('No document URL available');
            }
        }
        
        // UI State Functions
        function showLoading() {
            elements.status.className = 'status loading';
            elements.status.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading document...';
            elements.status.style.display = 'block';
        }
        
        function showSuccess() {
            elements.status.className = 'status success';
            elements.status.innerHTML = '<i class="fas fa-check-circle"></i> Document loaded successfully';
            setTimeout(() => {
                elements.status.style.display = 'none';
            }, 2000);
        }
        
        function showError(error) {
            console.error('Error:', error);
            elements.status.className = 'status error';
            elements.status.innerHTML = `
                <i class="fas fa-exclamation-circle"></i> Error loading document
                <div style="font-size: 0.9em; margin-top: 5px;">${error.message}</div>
            `;
            
            elements.contentArea.style.display = 'none';
            elements.emptyState.style.display = 'block';
            elements.emptyState.innerHTML = `
                <i class="fas fa-exclamation-triangle"></i>
                <h3>Failed to Load Document</h3>
                <p>${error.message}</p>
                <button class="btn" onclick="loadDocument(true)" style="margin-top: 1rem;">
                    <i class="fas fa-redo"></i> Try Again
                </button>
            `;
        }
        
        // Utility function
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Manual refresh with button
        window.loadDocument = loadDocument;
        window.openInDocs = openInDocs;
    </script>
